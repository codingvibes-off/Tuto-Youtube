<header class="header">
  <div class="header__inner">

    <!-- Logo -->
    <div class="header__logo">
      <span class="logo-text">Coding Test </span>
      <span class="logo-accent">ACADEMY</span>
      <span class="logo-dot"></span>
    </div>

    <!-- Nav desktop -->
    <nav class="header__nav" [class.open]="mobileMenuOpen">
      <a
        *ngFor="let link of navLinks"
        href="#"
        class="nav-link"
        [class.nav-link--active]="link.active"
      >
        {{ link.label }}
      </a>
    </nav>

    <!-- CTA button -->
    <button class="header__cta">
      <span>Commencer</span>
      <span class="cta-arrow">→</span>
    </button>

    <!-- Burger (mobile) -->
    <button class="header__burger" (click)="toggleMenu()" [class.is-open]="mobileMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
