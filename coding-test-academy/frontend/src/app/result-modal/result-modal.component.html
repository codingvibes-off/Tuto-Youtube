<div class="modal-backdrop" *ngIf="show">
  <div class="modal-content">
   <h2>🚀 Découvre ton style de test</h2>
    <div class="tags">
        <span class="badge"
            [ngStyle]="{
                'background-color': profileStyles[profile.tag].background,
                'color': profileStyles[profile.tag].color,
                'border': profileStyles[profile.tag].border
            }"
            >
            {{ profile.tag }}
            </span>
    </div>
    <div class="profile-description-article">
        <p>{{ profile.description }}</p>
        <a class="" href="{{profile.link}}">Voir l'article associé</a>
    </div>
  
    <button (click)="close()">Fermer</button>
    <div>
        
    </div>
  </div>
</div>
